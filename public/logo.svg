      .flame-curve { fill: none; stroke: #000; stroke-width: 12; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  
  <!-- Outer flame curve -->
  <path class="flame-curve" d="M 60 200 Q 50 150 70 100 Q 85 60 100 30 Q 115 60 130 100 Q 150 150 140 200"/>
  
  <!-- Middle flame curve -->
