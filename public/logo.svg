  <!-- Center petal curve -->
  <path d="M 100 240 Q 100 190 100 120 Q 100 70 100 20" 
        fill="none" stroke="#000000" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Right petal curve -->
  <path d="M 100 240 Q 130 200 135 140 Q 138 100 125 60 Q 115 30 100 20" 
        fill="none" stroke="#000000" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>